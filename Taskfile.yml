# https://taskfile.dev

version: '3'

dotenv: [ '.env' ]

tasks:
  default:
    cmds:
      - task help
  help:
    desc: Show available tasks and their description
    silent: true
    cmds:
      - 'echo ""'
      - 'echo "Usage: task [task-name] [options]"'
      - 'echo ""'
      - 'echo "Available tasks:"'
      - task --list

  test:
    desc: Run tests
    cmds:
      - coverage run -m pytest tests -s --cov=tiny_ca  --cov-branch --cov-report=term-missing -o log_cli=true
    silent: true

  publishtest:
    desc: Run tests and publish results to https://coveralls.io/
    cmds:
      - uv run pytest tests --cov=tiny_ca --cov-branch --cov-report=term-missing --cov-report=xml -o log_cli=true
      - coverage xml
      - coveralls


  lint:
    desc: Check code by linters
    cmds:
      - pre-commit run --all-files
  sync:
    desc: Update libs
    cmds:
      - uv sync -U --group lint --group tests --group docs

  init_docs:
    desc: init docs
    cmds:
      - mkdir docs
      - cd docs
      - sphinx-quickstart
      - echo 'change `./docs/conf.py`'
  docs:
    desc: Generate documentation
    dir: ./docs
    cmds:
      - rm -rf docs/build docs/source/modules
      - uv run sphinx-apidoc -f -o source/modules ../tiny_ca
      - mv -f source/modules/tiny_ca .rst source/modules/modules.rst
      - uv run make html
      - cp -r -f build/html/* ./
      - rm -rf ./build

    # ─────────────────────────────────────────────────────────────────────────
    # NEW: regenerate docs after code changes without full re-scaffold
    # ─────────────────────────────────────────────────────────────────────────
  docs-regen:
    desc: Regenerate API docs and HTML after source code changes
    cmds:
      # 1. Re-scan tiny_ca and update/create .rst stubs in source/modules/
      #    -f  — overwrite existing stubs
      #    -e  — one file per module (easier to read)
      #    -M  — put module docs before submodule docs
      - uv run sphinx-apidoc -f -e -M -o docs/source/modules tiny_ca
      # 2. Rebuild HTML from updated stubs
      - uv run sphinx-build -b html docs/source docs/build/html
      # 3. Copy result to docs/ root so gh-pages / static hosting works
      - cp -rf docs/build/html/* docs/
      # 4. Clean up intermediate build artefacts
      - rm -rf docs/build
    sources:
      # Task re-runs only when these files have changed
      - tiny_ca/**/*.py
      - docs/source/**/*.rst
      - docs/source/conf.py

  docspub:
    desc: Publish docs to gh-pages branch (run after committing changes)
    cmds:
      - git subtree push --prefix docs origin gh-pages

  build:
    desc: Build library
    cmds:
      - rm -rf dist
      - uv build

  publish:
    desc: Publish the compiled library
    cmds:
      - uv publish

  release:
    desc: "Bump version, build and publish. Usage: task release [type=patch|minor|major] (default: patch)"
    silent: true
    vars:
      BUMP_TYPE: '{{.type | default "patch"}}'
      PYPROJECT: "pyproject.toml"
    cmds:
      - |
        # Validate type
        if [ "{{.BUMP_TYPE}}" != "patch" ] && [ "{{.BUMP_TYPE}}" != "minor" ] && [ "{{.BUMP_TYPE}}" != "major" ]; then
          echo "[ERROR] Invalid type '{{.BUMP_TYPE}}'. Use: patch, minor or major"
          exit 1
        fi

        # Extract current version from pyproject.toml
        CURRENT=$(grep '^version' {{.PYPROJECT}} | head -1 | sed 's/version *= *"\(.*\)"/\1/')
        if [ -z "$CURRENT" ]; then
          echo "[ERROR] Could not find version in {{.PYPROJECT}}"
          exit 1
        fi

        MAJOR=$(echo "$CURRENT" | cut -d. -f1)
        MINOR=$(echo "$CURRENT" | cut -d. -f2)
        PATCH=$(echo "$CURRENT" | cut -d. -f3)

        if [ "{{.BUMP_TYPE}}" = "major" ]; then
          MAJOR=$((MAJOR + 1))
          MINOR=0
          PATCH=0
        elif [ "{{.BUMP_TYPE}}" = "minor" ]; then
          MINOR=$((MINOR + 1))
          PATCH=0
        else
          PATCH=$((PATCH + 1))
        fi

        NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"

        echo ">>> Bumping version: ${CURRENT} → ${NEW_VERSION} ({{.BUMP_TYPE}})"

        # Replace version in pyproject.toml (only first occurrence — the package version)
        sed -i "0,/^version = \"${CURRENT}\"/s//version = \"${NEW_VERSION}\"/" {{.PYPROJECT}}

        # Verify
        UPDATED=$(grep '^version' {{.PYPROJECT}} | head -1 | sed 's/version *= *"\(.*\)"/\1/')
        if [ "$UPDATED" != "$NEW_VERSION" ]; then
          echo "[ERROR] Version update failed. Check {{.PYPROJECT}} manually."
          exit 1
        fi

        echo "[OK] Version updated to ${NEW_VERSION}"

      - task: build
      - task: publish
