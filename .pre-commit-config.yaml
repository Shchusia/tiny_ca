default_language_version:
  python: python3.11

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff-check
        name: ruff
        entry: uv run ruff check ./tiny_ca --fix --config=pyproject.toml
        language: system
        pass_filenames: false

      - id: ruff-format
        args: [
          "--config=pyproject.toml"
        ]


  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 26.1.0
    hooks:
      - id: black
        name: black
        entry: uv run black ./tiny_ca --config=pyproject.toml
        language: system
        pass_filenames: false


  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        entry: uv run mypy ./tiny_ca --config-file=pyproject.toml
        language: system
        pass_filenames: false

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
        - id: bandit
          args:
            - -q
            - -r
            - tiny_ca

  - repo: https://github.com/pypa/pip-audit
    rev: v2.7.3
    hooks:
      - id: pip-audit
        args:
          - --progress-spinner=off
